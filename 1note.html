<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover, apple-mobile-web-app-capable=yes, apple-mobile-web-app-status-bar-style=default">
  <title>私人笔记本</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
      padding: 0.6rem;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .app-container {
      max-width: 550px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 2rem;
      padding: 1.4rem 1.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-top: 0.5rem;
    }
    h1 {
      font-weight: 600;
      font-size: 1.5rem;
      color: #1a1a1a;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notebook-selector {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .notebook-tag {
      background: #ffffff;
      border: 1px solid #ccc;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      cursor: pointer;
    }
    .notebook-tag.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    .notebook-add {
      background: transparent;
      border: 1px dashed #aaa;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #777;
      cursor: pointer;
    }
    .search-bar {
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      outline: none;
      color: #1a1a1a;
      background: #fafafa;
    }
    .search-bar:focus {
      border-color: #1a1a1a;
      background: #fff;
    }
    .sync-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: #999;
    }
    .sync-row input {
      border: 1px solid #ccc;
      border-radius: 1rem;
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
      width: 100px;
      outline: none;
    }
    .sync-row .btn {
      font-size: 0.7rem;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      background: white;
      border: 1px solid #ccc;
      color: #555;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .note-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 400px;
      overflow-y: auto;
    }
    .note-item {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .note-item:active {
      background: #f5f5f5;
    }
    .note-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #999;
    }
    .note-title-preview {
      font-weight: 700;
      font-size: 0.95rem;
      color: #1a1a1a;
    }
    .note-body-preview {
      font-size: 0.8rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edit-panel {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .edit-panel input, .edit-panel textarea {
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      outline: none;
      color: #1a1a1a;
      background: #fafafa;
      font-family: inherit;
      resize: vertical;
    }
    .edit-panel input:focus, .edit-panel textarea:focus {
      border-color: #1a1a1a;
      background: #fff;
    }
    .button-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      background: white;
      border: 2px solid #1a1a1a;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.6px;
      color: #1a1a1a;
      cursor: pointer;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      flex: 1 1 auto;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:active {
      background: #f0f0f0;
      transform: scale(0.97);
    }
    .btn.primary {
      background: #1a1a1a;
      color: white;
    }
    .btn.danger {
      border-color: #b33a3a;
      color: #b33a3a;
    }
    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 2rem;
      font-size: 0.9rem;
    }
    .setup-panel {
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .setup-panel input {
      border: 2px solid #e0e0e0;
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      outline: none;
      background: #fff;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    私人笔记本
    <button class="btn" id="newNoteBtn" style="flex:0 0 auto; font-size:0.8rem; padding:0.4rem 1rem;">+ 新建</button>
  </h1>

  <div class="notebook-selector" id="notebookSelector"></div>

  <input type="text" class="search-bar" id="searchInput" placeholder="搜索笔记...">

  <!-- 同步面板：用密码 + GitHub -->
  <div class="sync-row">
    <input type="password" id="syncPassword" placeholder="同步密码">
    <button class="btn" id="uploadBtn">上传备份</button>
    <button class="btn" id="downloadBtn">下载恢复</button>
    <span id="syncStatus">未同步</span>
  </div>

  <div class="note-list" id="noteList">
    <div class="empty-state">暂无笔记，点击「新建」开始记录</div>
  </div>

  <div class="edit-panel" id="editPanel" style="display:none;">
    <input type="text" id="noteTitleInput" placeholder="标题">
    <textarea id="noteBodyInput" rows="6" placeholder="内容..."></textarea>
    <div class="button-row">
      <button class="btn primary" id="saveNoteBtn">保存</button>
      <button class="btn" id="cancelEditBtn">取消</button>
      <button class="btn danger" id="deleteNoteBtn" style="display:none;">删除</button>
    </div>
  </div>

  <!-- 首次设置面板 -->
  <div class="setup-panel" id="setupPanel">
    <div style="font-weight:700;font-size:0.9rem;">首次使用：配置 GitHub 同步</div>
    <input type="text" id="githubUserInput" placeholder="GitHub 用户名">
    <input type="text" id="repoInput" placeholder="仓库名（如 NBACK）">
    <input type="password" id="tokenInput" placeholder="GitHub Token">
    <button class="btn primary" id="saveSetupBtn">保存配置</button>
    <div style="font-size:0.7rem;color:#999;">Token 生成：github.com/settings/tokens（勾选 repo）</div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'private_notebook_app_data';
    const SETUP_KEY = 'notebook_sync_config';

    let appData = {
      notebooks: {},
      activeNotebook: '默认'
    };
    let editingNoteId = null;
    let syncConfig = null; // { username, repo, token }

    // DOM
    const notebookSelector = document.getElementById('notebookSelector');
    const noteList = document.getElementById('noteList');
    const searchInput = document.getElementById('searchInput');
    const editPanel = document.getElementById('editPanel');
    const noteTitleInput = document.getElementById('noteTitleInput');
    const noteBodyInput = document.getElementById('noteBodyInput');
    const saveNoteBtn = document.getElementById('saveNoteBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const deleteNoteBtn = document.getElementById('deleteNoteBtn');
    const newNoteBtn = document.getElementById('newNoteBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const syncStatus = document.getElementById('syncStatus');
    const syncPassword = document.getElementById('syncPassword');
    const setupPanel = document.getElementById('setupPanel');
    const githubUserInput = document.getElementById('githubUserInput');
    const repoInput = document.getElementById('repoInput');
    const tokenInput = document.getElementById('tokenInput');
    const saveSetupBtn = document.getElementById('saveSetupBtn');

    // 简单加密/解密（用密码派生密钥）
    function encrypt(text, password) {
      // 用密码对每个字符做异或偏移，简单但有效（数据不是高度敏感的话足够）
      let result = '';
      for (let i = 0; i < text.length; i++) {
        const charCode = text.charCodeAt(i) ^ password.charCodeAt(i % password.length);
        result += String.fromCharCode(charCode);
      }
      return btoa(result);
    }

    function decrypt(encryptedBase64, password) {
      try {
        const str = atob(encryptedBase64);
        let result = '';
        for (let i = 0; i < str.length; i++) {
          const charCode = str.charCodeAt(i) ^ password.charCodeAt(i % password.length);
          result += String.fromCharCode(charCode);
        }
        return result;
      } catch(e) {
        return null;
      }
    }

    function loadSyncConfig() {
      const stored = localStorage.getItem(SETUP_KEY);
      if (stored) {
        try { syncConfig = JSON.parse(stored); } catch(e) { syncConfig = null; }
      }
      if (syncConfig && syncConfig.username && syncConfig.token && syncConfig.repo) {
        setupPanel.style.display = 'none';
        githubUserInput.value = syncConfig.username;
        repoInput.value = syncConfig.repo;
        tokenInput.value = syncConfig.token;
      } else {
        setupPanel.style.display = 'block';
        syncConfig = null;
      }
    }

    function saveSyncConfig() {
      const username = githubUserInput.value.trim();
      const repo = repoInput.value.trim();
      const token = tokenInput.value.trim();
      if (!username || !repo || !token) {
        alert('请填完整');
        return;
      }
      syncConfig = { username, repo, token };
      localStorage.setItem(SETUP_KEY, JSON.stringify(syncConfig));
      setupPanel.style.display = 'none';
      alert('配置已保存（仅存本机）');
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { appData = JSON.parse(stored); } catch(e) {}
      }
      if (!appData.notebooks || Object.keys(appData.notebooks).length === 0) {
        appData.notebooks = { '默认': [] };
        appData.activeNotebook = '默认';
      }
      if (!appData.activeNotebook || !appData.notebooks[appData.activeNotebook]) {
        appData.activeNotebook = Object.keys(appData.notebooks)[0];
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function renderAll() {
      renderNotebookSelector();
      renderNoteList();
    }

    function renderNotebookSelector() {
      notebookSelector.innerHTML = '';
      Object.keys(appData.notebooks).forEach(name => {
        const tag = document.createElement('span');
        tag.className = 'notebook-tag' + (name === appData.activeNotebook ? ' active' : '');
        tag.textContent = name;
        tag.addEventListener('click', () => {
          appData.activeNotebook = name;
          saveData();
          renderAll();
        });
        notebookSelector.appendChild(tag);
      });
      const addBtn = document.createElement('span');
      addBtn.className = 'notebook-add';
      addBtn.textContent = '+ 新本';
      addBtn.addEventListener('click', () => {
        const name = prompt('输入新笔记本名称：');
        if (name && name.trim()) {
          const trimmed = name.trim();
          if (!appData.notebooks[trimmed]) {
            appData.notebooks[trimmed] = [];
            appData.activeNotebook = trimmed;
            saveData();
            renderAll();
          } else {
            alert('该笔记本已存在');
          }
        }
      });
      notebookSelector.appendChild(addBtn);
    }

    function renderNoteList() {
      const query = searchInput.value.trim().toLowerCase();
      const notes = appData.notebooks[appData.activeNotebook] || [];
      const filtered = notes.filter(n => {
        if (!query) return true;
        return (n.title || '').toLowerCase().includes(query) || (n.body || '').toLowerCase().includes(query);
      }).sort((a, b) => (b.updatedAt || b.createdAt) - (a.updatedAt || a.createdAt));

      noteList.innerHTML = '';
      if (filtered.length === 0) {
        noteList.innerHTML = '<div class="empty-state">' + (query ? '没有匹配的笔记' : '暂无笔记') + '</div>';
        return;
      }
      filtered.forEach(note => {
        const item = document.createElement('div');
        item.className = 'note-item';
        item.innerHTML = `
          <div class="note-meta"><span>${formatDate(note.updatedAt || note.createdAt)}</span></div>
          <div class="note-title-preview">${escapeHtml(note.title || '无标题')}</div>
          <div class="note-body-preview">${escapeHtml(note.body || '空内容')}</div>
        `;
        item.addEventListener('click', () => openEditor(note.id));
        noteList.appendChild(item);
      });
    }

    function openEditor(noteId) {
      const notes = appData.notebooks[appData.activeNotebook] || [];
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      editingNoteId = noteId;
      noteTitleInput.value = note.title || '';
      noteBodyInput.value = note.body || '';
      deleteNoteBtn.style.display = 'flex';
      editPanel.style.display = 'flex';
    }

    function closeEditor() {
      editingNoteId = null;
      noteTitleInput.value = '';
      noteBodyInput.value = '';
      deleteNoteBtn.style.display = 'none';
      editPanel.style.display = 'none';
    }

    function saveCurrentNote() {
      const title = noteTitleInput.value.trim();
      const body = noteBodyInput.value.trim();
      if (!title && !body) return;
      const notes = appData.notebooks[appData.activeNotebook] || [];
      if (editingNoteId) {
        const idx = notes.findIndex(n => n.id === editingNoteId);
        if (idx >= 0) {
          notes[idx].title = title;
          notes[idx].body = body;
          notes[idx].updatedAt = Date.now();
        }
      } else {
        notes.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title, body,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
      }
      appData.notebooks[appData.activeNotebook] = notes;
      saveData();
      closeEditor();
      renderAll();
    }

    function deleteCurrentNote() {
      if (!editingNoteId) return;
      if (!confirm('确定删除？')) return;
      const notes = appData.notebooks[appData.activeNotebook] || [];
      appData.notebooks[appData.activeNotebook] = notes.filter(n => n.id !== editingNoteId);
      saveData();
      closeEditor();
      renderAll();
    }

    async function uploadToGitHub() {
      if (!syncConfig) { syncStatus.textContent = '请先配置 GitHub'; return; }
      const password = syncPassword.value;
      if (!password) { syncStatus.textContent = '请先输入同步密码'; return; }

      const plainText = JSON.stringify(appData);
      const encrypted = encrypt(plainText, password);
      const content = { data: encrypted };
      const base64 = btoa(unescape(encodeURIComponent(JSON.stringify(content))));
      const apiUrl = `https://api.github.com/repos/${syncConfig.username}/${syncConfig.repo}/contents/notebook_backup.json`;

      let sha = null;
      try {
        const resp = await fetch(apiUrl, {
          headers: { 'Authorization': `token ${syncConfig.token}` }
        });
        if (resp.ok) {
          const d = await resp.json();
          sha = d.sha;
        }
      } catch(e) {}

      const body = { message: 'update notebook backup', content: base64 };
      if (sha) body.sha = sha;

      const resp = await fetch(apiUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${syncConfig.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (resp.ok) {
        const now = new Date().toLocaleString('zh-CN');
        syncStatus.textContent = `已上传: ${now}`;
      } else {
        const err = await resp.json();
        syncStatus.textContent = '上传失败: ' + (err.message || '未知');
      }
    }

    async function downloadFromGitHub() {
      if (!syncConfig) { syncStatus.textContent = '请先配置 GitHub'; return; }
      const password = syncPassword.value;
      if (!password) { syncStatus.textContent = '请先输入同步密码'; return; }

      const apiUrl = `https://api.github.com/repos/${syncConfig.username}/${syncConfig.repo}/contents/notebook_backup.json`;
      const resp = await fetch(apiUrl, {
        headers: { 'Authorization': `token ${syncConfig.token}` }
      });

      if (!resp.ok) {
        syncStatus.textContent = '云端无备份文件';
        return;
      }

      const data = await resp.json();
      const decoded = decodeURIComponent(escape(atob(data.content)));
      try {
        const wrapper = JSON.parse(decoded);
        const plainText = decrypt(wrapper.data, password);
        if (!plainText) {
          syncStatus.textContent = '密码错误，无法解密';
          return;
        }
        const parsed = JSON.parse(plainText);
        if (parsed.notebooks) {
          appData = parsed;
          saveData();
          renderAll();
          const now = new Date().toLocaleString('zh-CN');
          syncStatus.textContent = `已从云端恢复: ${now}`;
        }
      } catch(e) {
        syncStatus.textContent = '备份文件格式错误或密码不对';
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatDate(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    // Events
    saveNoteBtn.addEventListener('click', saveCurrentNote);
    cancelEditBtn.addEventListener('click', closeEditor);
    deleteNoteBtn.addEventListener('click', deleteCurrentNote);
    newNoteBtn.addEventListener('click', () => {
      editingNoteId = null;
      noteTitleInput.value = '';
      noteBodyInput.value = '';
      deleteNoteBtn.style.display = 'none';
      editPanel.style.display = 'flex';
      noteTitleInput.focus();
    });
    searchInput.addEventListener('input', renderNoteList);
    uploadBtn.addEventListener('click', uploadToGitHub);
    downloadBtn.addEventListener('click', downloadFromGitHub);
    saveSetupBtn.addEventListener('click', saveSyncConfig);

    // Init
    loadSyncConfig();
    loadData();
    renderAll();
  })();
</script>
</body>
</html>
