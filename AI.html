<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover, apple-mobile-web-app-capable=yes, apple-mobile-web-app-status-bar-style=default">
  <title>技术知识卡 升级版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f5f5;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0.8rem;
      -webkit-tap-highlight-color: transparent;
    }
    .app-container {
      max-width: 550px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      padding: 1.5rem 1.2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a1a; text-align: center; }
    .nav-row { display: flex; justify-content: space-between; align-items: center; }
    .btn {
      background: #1a1a1a; color: white; border: none;
      padding: 0.4rem 1rem; border-radius: 1.5rem; font-weight: 600;
      font-size: 0.75rem; cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { background: #333; }
    .btn-outline {
      background: white; color: #1a1a1a; border: 1px solid #1a1a1a;
    }
    .card {
      background: #fafafa; border: 1px solid #e0e0e0;
      border-radius: 1.2rem; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .tech-title { font-weight: 700; font-size: 1rem; color: #1a1a1a; }
    .tech-desc { font-size: 0.85rem; line-height: 1.7; color: #333; user-select: text; -webkit-user-select: text; }
    .tech-desc::selection { background: #fff3b0; color: #1a1a1a; }
    .selected-box {
      background: #fffde7; border: 1px solid #ffe082; border-radius: 0.8rem;
      padding: 0.5rem 0.8rem; font-size: 0.8rem; color: #555; min-height: 2rem;
      word-break: break-word; display: flex; align-items: center;
    }
    .api-row { display: flex; gap: 0.5rem; align-items: center; }
    .api-row input {
      flex: 1; border: 1px solid #ccc; border-radius: 0.8rem;
      padding: 0.5rem 0.8rem; font-size: 0.8rem; outline: none; background: #fff;
    }
    .response-box {
      background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 0.8rem;
      padding: 0.6rem 0.8rem; font-size: 0.8rem; line-height: 1.6; color: #333;
      max-height: 200px; overflow-y: auto; white-space: pre-wrap;
    }
    /* 总库卡片 */
    .library-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;
      max-height: 300px; overflow-y: auto;
    }
    .lib-card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 0.8rem;
      padding: 0.5rem; font-size: 0.7rem; line-height: 1.4;
      display: flex; flex-direction: column; gap: 0.3rem;
      position: relative;
    }
    .lib-card .lib-title { font-weight: 700; color: #1a1a1a; }
    .lib-card .lib-desc { color: #555; }
    .lib-card .delete-lib {
      position: absolute; top: 4px; right: 6px;
      background: transparent; border: none; color: #ccc; font-size: 0.8rem; cursor: pointer;
    }
    .settings-panel { display: none; flex-direction: column; gap: 0.5rem; background: #f9f9f9; padding: 0.8rem; border-radius: 1rem; }
    .counter { font-size: 0.7rem; color: #aaa; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="nav-row">
    <h1>📚 知识卡</h1>
    <div style="display:flex;gap:0.4rem;">
      <button class="btn-outline btn" id="libraryBtn">📁 总库</button>
      <button class="btn-outline btn" id="settingsBtn">⚙️</button>
    </div>
  </div>

  <!-- 学习视图 -->
  <div id="learnView">
    <div class="card" id="card">
      <div class="tech-title" id="techTitle"></div>
      <div class="tech-desc" id="techDesc"></div>
    </div>
    <div class="selected-box" id="selectedBox">👆 选中上方文字提问</div>
    <div class="api-row">
      <input type="text" id="questionInput" placeholder="补充问题...">
      <button class="btn" id="askBtn">问AI</button>
    </div>
    <div class="response-box" id="responseBox" style="display:none;"></div>
    <div class="nav-row">
      <button class="btn-outline btn" id="collectBtn">📥 收藏到总库</button>
      <button class="btn" id="nextBtn">⟳ 下一个</button>
    </div>
    <div class="counter" id="counter"></div>
  </div>

  <!-- 总库视图 -->
  <div id="libraryView" style="display:none; flex-direction:column; gap:0.8rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:600;">📁 我的知识库</span>
      <button class="btn-outline btn" id="backToLearnBtn">← 返回学习</button>
    </div>
    <div class="library-grid" id="libraryGrid"></div>
    <button class="btn-outline btn" id="generateMoreBtn" style="align-self:center;">🤖 AI补充知识 (剩余<span id="genCount">35</span>条)</button>
    <div class="response-box" id="genStatus" style="display:none;"></div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key (sk-...)">
    <button class="btn" id="saveApiKeyBtn">保存Key</button>
    <button class="btn-outline btn" id="closeSettingsBtn">关闭</button>
  </div>
</div>

<script>
  (function() {
    // ========== 初始知识库（更具体的例子） ==========
    const DEFAULT_LIBRARY = [
      { title: "HTML localStorage", desc: "localStorage 是浏览器提供的本地存储空间，数据永久保存。\n示例代码：\nlocalStorage.setItem('name', '苏禾');\nlet name = localStorage.getItem('name'); // '苏禾'" },
      { title: "PWA 添加到桌面", desc: "PWA 可以让网页像App一样被添加到手机桌面。\n关键步骤：\n1. 在 head 中添加 <link rel='manifest' href='manifest.json'>\n2. 注册 Service Worker\n3. 浏览器自动提示“添加到主屏幕”" },
      { title: "Python pip 国内镜像", desc: "pip 安装库时使用国内镜像加速：\npip install requests -i https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com\n\n常用镜像：\n- 阿里云：mirrors.aliyun.com\n- 清华：pypi.tuna.tsinghua.edu.cn\n- 腾讯云：mirrors.cloud.tencent.com" },
      { title: "Python 虚拟环境", desc: "虚拟环境为每个项目创建独立的Python空间。\n创建：python -m venv myenv\n激活(Windows)：myenv\\Scripts\\activate\n激活(Mac/Linux)：source myenv/bin/activate\n退出：deactivate" },
      { title: "pydirectinput 游戏按键", desc: "pydirectinput 用于游戏模拟键鼠，绕过输入屏蔽。\n示例代码：\nimport pydirectinput\nimport time\ntime.sleep(3)\npydirectinput.press('x')  # 按一次X键\npydirectinput.click(500, 400)  # 点击坐标" },
      { title: "PyInstaller 打包 exe", desc: "PyInstaller 把Python脚本打包成exe。\n基础命令：\npyinstaller --onefile --noconsole 你的脚本.py\n\n可选参数：\n--icon=图标.ico  添加图标\n--name=名字  自定义输出名" },
      { title: "DeepSeek API 调用", desc: "调用DeepSeek API需要API Key。\n示例代码(Python)：\nimport requests\nheaders = {'Authorization': 'Bearer sk-xxx'}\ndata = {'model':'deepseek-chat','messages':[{'role':'user','content':'你好'}]}\nr = requests.post('https://api.deepseek.com/chat/completions',json=data,headers=headers)\nprint(r.json()['choices'][0]['message']['content'])" },
      { title: "Ollama 本地模型", desc: "Ollama 让你在本地免费运行AI模型。\n安装：访问ollama.com下载\n下载模型：ollama pull deepseek-r1:7b\n运行：ollama run deepseek-r1:7b\nAPI地址：http://localhost:11434/api/chat\n\n注意事项：\n1. 需要至少8GB显存运行7B模型\n2. 默认装C盘，可通过环境变量OLLAMA_MODELS改路径\n3. 不用时在任务栏右键退出" },
      { title: "GitHub Token 认证", desc: "GitHub Token 代替密码进行API操作。\n生成步骤：\n1. 访问 github.com/settings/tokens\n2. 点 Generate new token (classic)\n3. 勾选 repo 权限\n4. 生成后立即复制（只显示一次）\n格式：ghp_xxxxxxxxxxxxxxxx" },
      { title: "Gradle 国内镜像", desc: "Android项目构建时Gradle下载慢，可换国内镜像。\n修改文件：gradle/wrapper/gradle-wrapper.properties\n将 distributionUrl 改为：\nhttps\\://mirrors.cloud.tencent.com/gradle/gradle-8.11.1-bin.zip\n\n其他可用镜像：\n- 阿里云：mirrors.aliyun.com/macports/distfiles/gradle/\n- 华为云：mirrors.huaweicloud.com/gradle/" },
      { title: "CORS 跨域问题", desc: "CORS 是浏览器安全策略，阻止跨域请求。\n解决方法：\n1. 浏览器扩展中把请求移到 background.js（有更高权限）\n2. 服务端设置 Access-Control-Allow-Origin 头\n3. 使用代理服务器转发请求\n\n你的B站收藏夹同步就是因为CORS导致Failed to fetch。" },
      { title: "Docker 容器", desc: "Docker 把软件和依赖打包成容器，到处可运行。\n常用命令：\ndocker run -d --name myapp nginx  # 启动容器\ndocker ps  # 查看运行中的容器\ndocker stop myapp  # 停止容器\n\n你的 OpenBiliClaw 项目就需要 Docker 来运行后端服务。" },
      { title: "JSON 数据格式", desc: "JSON 是键值对格式，用于数据交换。\n示例：\n{\"name\":\"苏禾\",\"age\":29,\"items\":[\"输液架\",\"绷带\"]}\n\n操作(JavaScript)：\nlet obj = JSON.parse(jsonString);  // 解析\nlet str = JSON.stringify(obj);  // 转字符串" },
      { title: "Android Gradle 构建文件", desc: "build.gradle 是Android项目的构建配置。\n关键配置：\n- applicationId：应用包名\n- minSdk：最低支持Android版本\n- targetSdk：目标版本\n- dependencies：项目依赖的库\n\n修改后需要点大象图标同步(Sync)。" },
      { title: "WebRTC 局域网通信", desc: "WebRTC 让浏览器之间直接传输数据。\nLocalSend 就是基于类似原理。\n\n关键概念：\n1. 不需要服务器中转\n2. 两个设备必须在同一局域网\n3. 通过信令服务器初次握手\n4. 之后P2P直连传输" }
    ];

    let library = [];          // 总库
    let currentCard = null;   // 当前显示的知识卡
    let selectedText = '';
    let apiKey = '';

    // DOM
    const techTitle = document.getElementById('techTitle');
    const techDesc = document.getElementById('techDesc');
    const selectedBox = document.getElementById('selectedBox');
    const questionInput = document.getElementById('questionInput');
    const askBtn = document.getElementById('askBtn');
    const responseBox = document.getElementById('responseBox');
    const nextBtn = document.getElementById('nextBtn');
    const collectBtn = document.getElementById('collectBtn');
    const counter = document.getElementById('counter');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const libraryBtn = document.getElementById('libraryBtn');
    const learnView = document.getElementById('learnView');
    const libraryView = document.getElementById('libraryView');
    const libraryGrid = document.getElementById('libraryGrid');
    const backToLearnBtn = document.getElementById('backToLearnBtn');
    const generateMoreBtn = document.getElementById('generateMoreBtn');
    const genStatus = document.getElementById('genStatus');
    const genCount = document.getElementById('genCount');

    // ========== 数据管理 ==========
    function loadLibrary() {
      const stored = localStorage.getItem('tech_library');
      if (stored) {
        try { library = JSON.parse(stored); } catch(e) { library = []; }
      }
      if (library.length === 0) {
        library = [...DEFAULT_LIBRARY];
        saveLibrary();
      }
    }

    function saveLibrary() {
      localStorage.setItem('tech_library', JSON.stringify(library));
    }

    function loadApiKey() {
      apiKey = localStorage.getItem('deepseek_api_key') || '';
      if (apiKey) apiKeyInput.value = apiKey;
    }

    function saveApiKey() {
      const key = apiKeyInput.value.trim();
      if (key) {
        localStorage.setItem('deepseek_api_key', key);
        apiKey = key;
        alert('API Key 已保存');
      }
    }

    // ========== 学习视图 ==========
    function randomCard() {
      if (library.length === 0) {
        techTitle.textContent = '知识库为空';
        techDesc.textContent = '请点击下方“AI补充知识”来生成新的知识卡。';
        return;
      }
      const idx = Math.floor(Math.random() * library.length);
      currentCard = library[idx];
      techTitle.textContent = currentCard.title;
      techDesc.textContent = currentCard.desc;
      selectedText = '';
      selectedBox.textContent = '👆 选中上方文字提问';
      questionInput.value = '';
      responseBox.style.display = 'none';
      counter.textContent = `总库 ${library.length} 条`;
    }

    function collectToLibrary() {
      if (!currentCard) return;
      // 避免重复
      if (!library.some(c => c.title === currentCard.title && c.desc === currentCard.desc)) {
        library.push({ ...currentCard });
        saveLibrary();
        alert('已收藏到总库');
        counter.textContent = `总库 ${library.length} 条`;
      } else {
        alert('该知识已在总库中');
      }
    }

    // ========== 总库视图 ==========
    function renderLibrary() {
      libraryGrid.innerHTML = '';
      if (library.length === 0) {
        libraryGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ccc;padding:20px;">总库为空</div>';
      }
      library.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'lib-card';
        card.innerHTML = `
          <button class="delete-lib" data-index="${idx}">✕</button>
          <div class="lib-title">${escHtml(item.title)}</div>
          <div class="lib-desc">${escHtml(item.desc.slice(0, 80))}...</div>
        `;
        card.querySelector('.delete-lib').addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('删除此知识？')) {
            library.splice(idx, 1);
            saveLibrary();
            renderLibrary();
            updateGenCount();
          }
        });
        libraryGrid.appendChild(card);
      });
      updateGenCount();
    }

    function updateGenCount() {
      const remain = Math.max(0, 35 - library.length);
      genCount.textContent = remain;
    }

    // ========== AI 生成新知识 ==========
    async function generateMore() {
      if (!apiKey) { alert('请先设置 DeepSeek API Key'); return; }
      genStatus.style.display = 'block';
      genStatus.textContent = '⏳ AI 正在生成新知识卡...';
      const existingTitles = library.map(c => c.title).join('、');
      const prompt = `你是一个技术知识生成器。用户已学习的技术包括：${existingTitles}。请生成35条新的技术知识卡，主题涵盖：编程语言(Python/JavaScript)、开发工具(Git/Docker/Gradle)、前端技术(HTML/CSS/PWA/浏览器扩展)、API调用、计算机基础等。每条知识卡是一个JSON对象：{"title":"技术名称","desc":"详细描述（包含示例代码或多个注意点，用\\n换行，150-300字）"}。直接输出JSON数组，不要其他文字。`;

      try {
        const resp = await fetch('https://api.deepseek.com/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.8,
            max_tokens: 4000
          })
        });
        if (!resp.ok) throw new Error('请求失败: ' + resp.status);
        const json = await resp.json();
        const text = json.choices[0].message.content;
        const match = text.match(/\[[\s\S]*\]/);
        if (!match) throw new Error('AI 返回格式错误');
        const newCards = JSON.parse(match[0]);
        newCards.forEach(c => {
          if (!library.some(l => l.title === c.title)) {
            library.push(c);
          }
        });
        saveLibrary();
        renderLibrary();
        genStatus.textContent = `✅ 成功添加 ${newCards.length} 条新知识`;
      } catch (err) {
        genStatus.textContent = '❌ 生成失败：' + err.message;
      }
    }

    // ========== 问AI ==========
    async function askAI() {
      if (!selectedText && !questionInput.value.trim()) {
        alert('请先选中文字或输入问题');
        return;
      }
      if (!apiKey) { alert('请先设置API Key'); return; }
      responseBox.style.display = 'block';
      responseBox.textContent = '⏳ 思考中...';
      const prompt = `用户选中了：\n"${selectedText}"\n\n补充问题：${questionInput.value.trim() || '请解释'}\n\n请用通俗易懂的语言回答，简洁明了，不超过200字。`;
      try {
        const resp = await fetch('https://api.deepseek.com/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.7, max_tokens: 400
          })
        });
        if (!resp.ok) throw new Error('请求失败: ' + resp.status);
        const j = await resp.json();
        responseBox.textContent = j.choices[0].message.content;
      } catch (err) {
        responseBox.textContent = '❌ ' + err.message;
      }
    }

    // ========== 辅助 ==========
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    document.addEventListener('mouseup', () => {
      setTimeout(() => {
        const sel = window.getSelection();
        const text = sel?.toString().trim();
        if (text) {
          selectedText = text;
          selectedBox.textContent = '📌 已选中：' + text.slice(0, 80) + (text.length > 80 ? '...' : '');
        }
      }, 100);
    });
    document.addEventListener('touchend', () => {
      setTimeout(() => {
        const sel = window.getSelection();
        const text = sel?.toString().trim();
        if (text) {
          selectedText = text;
          selectedBox.textContent = '📌 已选中：' + text.slice(0, 80) + (text.length > 80 ? '...' : '');
        }
      }, 100);
    });

    // ========== 事件 ==========
    nextBtn.addEventListener('click', randomCard);
    collectBtn.addEventListener('click', collectToLibrary);
    askBtn.addEventListener('click', askAI);
    settingsBtn.addEventListener('click', () => {
      settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
    });
    saveApiKeyBtn.addEventListener('click', saveApiKey);
    closeSettingsBtn.addEventListener('click', () => { settingsPanel.style.display = 'none'; });
    libraryBtn.addEventListener('click', () => {
      learnView.style.display = 'none';
      libraryView.style.display = 'flex';
      renderLibrary();
    });
    backToLearnBtn.addEventListener('click', () => {
      libraryView.style.display = 'none';
      learnView.style.display = 'flex';
      randomCard();
    });
    generateMoreBtn.addEventListener('click', generateMore);

    // ========== 初始化 ==========
    loadApiKey();
    loadLibrary();
    randomCard();
  })();
</script>
</body>
</html>
