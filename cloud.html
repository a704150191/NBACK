<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover, apple-mobile-web-app-capable=yes, apple-mobile-web-app-status-bar-style=default">
  <title>个人传输助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
      padding: 0.6rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .app-container {
      max-width: 550px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 2rem;
      padding: 1.4rem 1.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h1 {
      font-weight: 600;
      font-size: 1.5rem;
      color: #1a1a1a;
      letter-spacing: 1px;
      text-align: center;
    }
    .input-area {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 2rem;
      padding: 0.4rem;
    }
    .input-area input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.7rem 1rem;
      font-size: 0.95rem;
      outline: none;
      color: #1a1a1a;
    }
    .input-area button {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 0.7rem 1.4rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .input-area button:active { background: #333; }
    .message-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 500px;
      overflow-y: auto;
      padding: 0.2rem;
    }
    .message-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      gap: 0.5rem;
    }
    .message-content {
      flex: 1;
      font-size: 0.9rem;
      color: #1a1a1a;
      word-break: break-word;
      line-height: 1.5;
    }
    .message-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .message-time {
      font-size: 0.65rem;
      color: #aaa;
      white-space: nowrap;
    }
    .message-delete {
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.2rem;
      -webkit-tap-highlight-color: transparent;
    }
    .message-delete:active { color: #b33a3a; }
    .empty-state {
      text-align: center;
      color: #ccc;
      padding: 2rem;
      font-size: 0.9rem;
    }
    .sync-row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.7rem;
      justify-content: center;
      border-top: 1px solid #eee;
      padding-top: 0.6rem;
    }
    .sync-row input {
      width: 80px;
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      border-radius: 0.5rem;
      border: 1px solid #ccc;
    }
    .sync-row button {
      padding: 0.3rem 0.7rem;
      font-size: 0.65rem;
      border-radius: 1rem;
      border: 1px solid #aaa;
      background: white;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .sync-row button:active { background: #1a1a1a; color: white; }
    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .clear-btn {
      background: transparent;
      border: none;
      color: #bbb;
      font-size: 0.65rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .reset-link {
      font-size: 0.6rem;
      color: #bbb;
      text-align: center;
      cursor: pointer;
      text-decoration: underline;
    }
    .setup-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .setup-panel {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .setup-panel input {
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      border-radius: 1rem;
      border: 1px solid #ccc;
    }
    .setup-panel button {
      padding: 0.7rem;
      border-radius: 2rem;
      background: #1a1a1a;
      color: white;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    @media (max-width: 500px) {
      .app-container { padding: 1rem 0.8rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>个人传输助手</h1>

  <div class="input-area">
    <input type="text" id="contentInput" placeholder="输入文本、链接、备忘...">
    <button id="sendBtn">发送</button>
  </div>

  <div class="message-list" id="messageList">
    <div class="empty-state">暂无内容</div>
  </div>

  <div class="sync-row">
    <input type="password" id="syncPassword" placeholder="同步密码">
    <button id="uploadBtn">上传</button>
    <button id="downloadBtn">下载</button>
    <span id="syncStatus" style="font-size:0.65rem;color:#999;"></span>
  </div>

  <div class="bottom-row">
    <div class="reset-link" id="resetConfigLink">重置配置</div>
    <button class="clear-btn" id="clearAllBtn">清空全部</button>
  </div>
</div>

<div class="setup-overlay" id="setupOverlay">
  <div class="setup-panel">
    <h3 style="text-align:center;">配置 GitHub 同步</h3>
    <input type="text" id="githubUserInput" placeholder="GitHub 用户名">
    <input type="text" id="repoInput" placeholder="仓库名（如 NBACK）">
    <input type="password" id="tokenInput" placeholder="GitHub Token (ghp_开头)">
    <button id="saveSetupBtn">保存配置</button>
    <div style="font-size:0.65rem;color:#999;text-align:center;">
      Token 获取：github.com/settings/tokens （勾选 repo）
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'transfer_assistant_messages';
    const SETUP_KEY = 'transfer_sync_config';
    const SYNC_FILE = 'transfer_assistant.json';

    let messages = [];
    let syncConfig = null;

    const contentInput = document.getElementById('contentInput');
    const sendBtn = document.getElementById('sendBtn');
    const messageList = document.getElementById('messageList');
    const syncPassword = document.getElementById('syncPassword');
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const syncStatus = document.getElementById('syncStatus');
    const setupOverlay = document.getElementById('setupOverlay');
    const githubUserInput = document.getElementById('githubUserInput');
    const repoInput = document.getElementById('repoInput');
    const tokenInput = document.getElementById('tokenInput');
    const saveSetupBtn = document.getElementById('saveSetupBtn');
    const resetConfigLink = document.getElementById('resetConfigLink');
    const clearAllBtn = document.getElementById('clearAllBtn');

    function encrypt(text, password) {
      let result = '';
      for (let i = 0; i < text.length; i++) result += String.fromCharCode(text.charCodeAt(i) ^ password.charCodeAt(i % password.length));
      return btoa(result);
    }
    function decrypt(encBase64, password) {
      try {
        const str = atob(encBase64);
        let result = '';
        for (let i = 0; i < str.length; i++) result += String.fromCharCode(str.charCodeAt(i) ^ password.charCodeAt(i % password.length));
        return result;
      } catch(e) { return null; }
    }

    function loadSyncConfig() {
      const stored = localStorage.getItem(SETUP_KEY);
      if (stored) { try { syncConfig = JSON.parse(stored); } catch { syncConfig = null; } }
      if (syncConfig && syncConfig.username && syncConfig.token && syncConfig.repo) {
        setupOverlay.style.display = 'none';
      } else {
        setupOverlay.style.display = 'flex';
        syncConfig = null;
      }
    }
    function saveSyncConfig() {
      const u = githubUserInput.value.trim();
      const r = repoInput.value.trim();
      const t = tokenInput.value.trim();
      if (!u || !r || !t) { alert('请填完整'); return; }
      syncConfig = { username: u, repo: r, token: t };
      localStorage.setItem(SETUP_KEY, JSON.stringify(syncConfig));
      setupOverlay.style.display = 'none';
    }
    function resetSyncConfig() {
      localStorage.removeItem(SETUP_KEY);
      syncConfig = null;
      setupOverlay.style.display = 'flex';
      githubUserInput.value = '';
      repoInput.value = '';
      tokenInput.value = '';
    }

    function loadMessages() {
      const stored = localStorage.getItem(STORAGE_KEY);
      messages = stored ? (() => { try { return JSON.parse(stored); } catch(e) { return []; } })() : [];
    }
    function saveMessages() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    }

    function renderMessages() {
      messageList.innerHTML = '';
      if (messages.length === 0) {
        messageList.innerHTML = '<div class="empty-state">暂无内容</div>';
        return;
      }
      [...messages].reverse().forEach((msg, i) => {
        const realIndex = messages.length - 1 - i;
        const div = document.createElement('div');
        div.className = 'message-item';
        div.innerHTML = `
          <div class="message-content">${escapeHtml(msg.text)}</div>
          <div class="message-meta">
            <span class="message-time">${formatTime(msg.time)}</span>
            <button class="message-delete" data-index="${realIndex}">删除</button>
          </div>
        `;
        div.querySelector('.message-delete').addEventListener('click', (e) => {
          e.stopPropagation();
          if (confirm('删除这条？')) {
            messages.splice(realIndex, 1);
            saveMessages();
            renderMessages();
          }
        });
        messageList.appendChild(div);
      });
    }

    function sendMessage() {
      const val = contentInput.value.trim();
      if (!val) return;
      messages.push({ text: val, time: Date.now() });
      saveMessages();
      contentInput.value = '';
      renderMessages();
      messageList.scrollTop = 0;
    }

    function clearAll() {
      if (!confirm('确定清空全部内容？此操作不可恢复。')) return;
      messages = [];
      saveMessages();
      renderMessages();
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function formatTime(ts) {
      return new Date(ts).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    async function uploadToGitHub() {
      if (!syncConfig) { syncStatus.textContent = '请先配置GitHub'; return; }
      const pw = syncPassword.value;
      if (!pw) { syncStatus.textContent = '请输入同步密码'; return; }
      syncStatus.textContent = '上传中...';
      const plain = JSON.stringify(messages);
      const encrypted = encrypt(plain, pw);
      const content = btoa(unescape(encodeURIComponent(JSON.stringify({ data: encrypted }))));
      const apiUrl = `https://api.github.com/repos/${syncConfig.username}/${syncConfig.repo}/contents/${SYNC_FILE}`;

      let sha = null;
      try {
        const resp = await fetch(apiUrl, { headers: { 'Authorization': `token ${syncConfig.token}` } });
        if (resp.ok) { const d = await resp.json(); sha = d.sha; }
      } catch(e) {}

      const body = { message: 'update transfer assistant', content };
      if (sha) body.sha = sha;

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const resp = await fetch(apiUrl, {
          method: 'PUT',
          headers: { 'Authorization': `token ${syncConfig.token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (resp.ok) {
          syncStatus.textContent = '已上传 ' + new Date().toLocaleTimeString('zh-CN');
        } else {
          const err = await resp.json().catch(() => ({}));
          syncStatus.textContent = '上传失败: ' + (err.message || resp.status);
        }
      } catch(e) {
        syncStatus.textContent = e.name === 'AbortError' ? '请求超时' : '网络错误';
      }
    }

    async function downloadFromGitHub() {
      if (!syncConfig) { syncStatus.textContent = '请先配置GitHub'; return; }
      const pw = syncPassword.value;
      if (!pw) { syncStatus.textContent = '请输入同步密码'; return; }
      syncStatus.textContent = '下载中...';
      const apiUrl = `https://api.github.com/repos/${syncConfig.username}/${syncConfig.repo}/contents/${SYNC_FILE}`;
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const resp = await fetch(apiUrl, {
          headers: { 'Authorization': `token ${syncConfig.token}` },
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (!resp.ok) { syncStatus.textContent = '云端暂无备份'; return; }
        const d = await resp.json();
        const wrapper = JSON.parse(decodeURIComponent(escape(atob(d.content))));
        const plain = decrypt(wrapper.data, pw);
        if (!plain) { syncStatus.textContent = '密码错误'; return; }
        const parsed = JSON.parse(plain);
        if (Array.isArray(parsed)) messages = parsed;
        saveMessages();
        renderMessages();
        syncStatus.textContent = '已下载 ' + new Date().toLocaleTimeString('zh-CN');
      } catch(e) {
        syncStatus.textContent = e.name === 'AbortError' ? '请求超时' : '数据格式错误或密码不对';
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    contentInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    uploadBtn.addEventListener('click', uploadToGitHub);
    downloadBtn.addEventListener('click', downloadFromGitHub);
    saveSetupBtn.addEventListener('click', saveSyncConfig);
    resetConfigLink.addEventListener('click', () => {
      if (confirm('确定要重置配置吗？仅清除 Token 设置，不影响数据。')) resetSyncConfig();
    });
    clearAllBtn.addEventListener('click', clearAll);

    loadSyncConfig();
    loadMessages();
    renderMessages();
  })();
</script>
</body>
</html>
