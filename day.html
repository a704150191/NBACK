<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover, apple-mobile-web-app-capable=yes">
    <title>每日记录表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
            padding: 0.6rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 100%;
            width: 100%;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 1.8rem;
            padding: 1.2rem 1rem 1.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            color: #1a1a1a;
            letter-spacing: 1px;
            text-align: center;
        }
        .input-area {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 2rem;
            padding: 0.4rem;
        }
        .input-area input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            outline: none;
            color: #1a1a1a;
        }
        .input-area button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .category-selector {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .category-selector.active {
            display: flex;
        }
        .category-panel {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem 1rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .category-panel h3 {
            text-align: center;
            font-size: 1.2rem;
            color: #1a1a1a;
            margin-bottom: 0.2rem;
        }
        .grid-choices {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }
        .grid-choices button {
            background: white;
            border: 2px solid #1a1a1a;
            border-radius: 1.2rem;
            padding: 0.8rem 0.3rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: #1a1a1a;
            cursor: pointer;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-break: break-word;
        }
        .grid-choices button:active {
            background: #1a1a1a;
            color: white;
        }
        .cancel-btn {
            background: #f0f0f0;
            border: none;
            border-radius: 2rem;
            padding: 0.7rem;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            text-align: center;
            margin-top: 0.3rem;
        }
        .table-wrapper {
            overflow-x: auto;
            width: 100%;
            border: 1px solid #e0e0e0;
            border-radius: 1.2rem;
            background: #fafafa;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
            font-size: 0.8rem;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0.5rem 0.3rem;
            text-align: left;
            vertical-align: top;
            background: white;
        }
        th {
            background: #f5f5f5;
            font-weight: 700;
            color: #1a1a1a;
            position: sticky;
            top: 0;
        }
        .date-col {
            font-weight: 600;
            white-space: nowrap;
            color: #333;
            background: #fafafa;
        }
        .content-cell {
            font-size: 0.75rem;
            line-height: 1.5;
            color: #333;
            min-height: 1.8rem;
        }
        .content-cell ol {
            margin: 0;
            padding-left: 1.2rem;
        }
        .content-cell li {
            margin-bottom: 2px;
            word-break: break-word;
        }
        .empty-cell {
            color: #ccc;
            font-style: italic;
        }
        .sync-row {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.7rem;
            justify-content: center;
        }
        .sync-row input {
            width: 80px;
            padding: 0.3rem 0.5rem;
            font-size: 0.7rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
        }
        .sync-row button {
            padding: 0.3rem 0.7rem;
            font-size: 0.65rem;
            border-radius: 1rem;
            border: 1px solid #aaa;
            background: white;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
        }
        .sync-row button:active {
            background: #1a1a1a;
            color: white;
        }
        .footer-note {
            text-align: center;
            color: #999;
            font-size: 0.7rem;
        }
        .setup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .setup-panel {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .setup-panel input {
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            border-radius: 1rem;
            border: 1px solid #ccc;
        }
        .setup-panel button {
            padding: 0.7rem;
            border-radius: 2rem;
            background: #1a1a1a;
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        @media (max-width: 500px) {
            .app-container { padding: 1rem 0.8rem; }
            th, td { padding: 0.4rem 0.2rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <h1>每日记录 · 六项追踪</h1>

    <div class="input-area">
        <input type="text" id="contentInput" placeholder="输入内容，点击右侧添加...">
        <button id="addBtn">确认</button>
    </div>

    <div class="category-selector" id="categorySelector">
        <div class="category-panel">
            <h3>选择分类</h3>
            <div class="grid-choices" id="categoryGrid">
                <button data-category="戒烟">1. 戒烟</button>
                <button data-category="COPD">2. COPD</button>
                <button data-category="降糖">3. 降糖</button>
                <button data-category="肺动脉高压">4. 肺动脉高压</button>
                <button data-category="公司">5. 公司</button>
                <button data-category="中心">6. 中心</button>
            </div>
            <button class="cancel-btn" id="cancelCategoryBtn">取消</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="recordTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>戒烟</th>
                    <th>COPD</th>
                    <th>降糖</th>
                    <th>肺动脉高压</th>
                    <th>公司</th>
                    <th>中心</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="sync-row">
        <input type="password" id="syncPassword" placeholder="同步密码">
        <button id="uploadBtn">上传</button>
        <button id="downloadBtn">下载</button>
        <span id="syncStatus" style="font-size:0.65rem;color:#999;"></span>
    </div>
    <div class="footer-note">每天自动生成一行 · 点击类别编号选择分类</div>
</div>

<div class="setup-overlay" id="setupOverlay">
    <div class="setup-panel">
        <h3 style="text-align:center;">配置 GitHub 同步</h3>
        <input type="text" id="githubUserInput" placeholder="GitHub 用户名">
        <input type="text" id="repoInput" placeholder="仓库名（如 NBACK）">
        <input type="password" id="tokenInput" placeholder="GitHub Token (ghp_开头)">
        <button id="saveSetupBtn">保存配置</button>
        <div style="font-size:0.65rem;color:#999;text-align:center;">
            Token 获取：github.com/settings/tokens （勾选 repo）
        </div>
    </div>
</div>

<script>
    (function() {
        const STORAGE_KEY = 'daily_tracker_data';
        const SETUP_KEY = 'tracker_sync_config';
        const SYNC_FILE = 'daily_tracker.json';
        const CATEGORIES = ['戒烟', 'COPD', '降糖', '肺动脉高压', '公司', '中心'];

        let data = {};
        let syncConfig = null;
        let pendingContent = '';

        const contentInput = document.getElementById('contentInput');
        const addBtn = document.getElementById('addBtn');
        const categorySelector = document.getElementById('categorySelector');
        const categoryGrid = document.getElementById('categoryGrid');
        const cancelCategoryBtn = document.getElementById('cancelCategoryBtn');
        const tableBody = document.getElementById('tableBody');
        const syncPassword = document.getElementById('syncPassword');
        const uploadBtn = document.getElementById('uploadBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const syncStatus = document.getElementById('syncStatus');
        const setupOverlay = document.getElementById('setupOverlay');
        const githubUserInput = document.getElementById('githubUserInput');
        const repoInput = document.getElementById('repoInput');
        const tokenInput = document.getElementById('tokenInput');
        const saveSetupBtn = document.getElementById('saveSetupBtn');

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function encrypt(text, password) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ password.charCodeAt(i % password.length));
            }
            return btoa(result);
        }
        function decrypt(encBase64, password) {
            try {
                const str = atob(encBase64);
                let result = '';
                for (let i = 0; i < str.length; i++) {
                    result += String.fromCharCode(str.charCodeAt(i) ^ password.charCodeAt(i % password.length));
                }
                return result;
            } catch(e) { return null; }
        }

        function loadSyncConfig() {
            const stored = localStorage.getItem(SETUP_KEY);
            if (stored) {
                try { syncConfig = JSON.parse(stored); } catch { syncConfig = null; }
            }
            if (syncConfig && syncConfig.username && syncConfig.token && syncConfig.repo) {
                setupOverlay.style.display = 'none';
            } else {
                setupOverlay.style.display = 'flex';
                syncConfig = null;
            }
        }

        function saveSyncConfig() {
            const u = githubUserInput.value.trim();
            const r = repoInput.value.trim();
            const t = tokenInput.value.trim();
            if (!u || !r || !t) { alert('请填完整'); return; }
            syncConfig = { username: u, repo: r, token: t };
            localStorage.setItem(SETUP_KEY, JSON.stringify(syncConfig));
            setupOverlay.style.display = 'none';
        }

        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { data = JSON.parse(stored); } catch(e) { data = {}; }
            } else {
                data = {};
            }
            const today = getTodayString();
            if (!data[today]) {
                data[today] = {};
                CATEGORIES.forEach(cat => { data[today][cat] = []; });
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function renderTable() {
            const dates = Object.keys(data).sort((a,b) => b.localeCompare(a));
            tableBody.innerHTML = '';
            if (dates.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:#999;">暂无记录</td></tr>';
                return;
            }
            dates.forEach(date => {
                const row = document.createElement('tr');
                const dateCell = document.createElement('td');
                dateCell.className = 'date-col';
                dateCell.textContent = date;
                row.appendChild(dateCell);
                CATEGORIES.forEach(cat => {
                    const td = document.createElement('td');
                    td.className = 'content-cell';
                    const items = data[date]?.[cat] || [];
                    if (items.length === 0) {
                        td.innerHTML = '<span class="empty-cell">-</span>';
                    } else {
                        const ol = document.createElement('ol');
                        items.forEach(item => {
                            const li = document.createElement('li');
                            li.textContent = item;
                            ol.appendChild(li);
                        });
                        td.appendChild(ol);
                    }
                    row.appendChild(td);
                });
                tableBody.appendChild(row);
            });
        }

        function showCategorySelector() {
            categorySelector.classList.add('active');
        }
        function hideCategorySelector() {
            categorySelector.classList.remove('active');
            pendingContent = '';
        }

        function addContentToCategory(category) {
            if (!pendingContent.trim()) return;
            const today = getTodayString();
            if (!data[today]) {
                data[today] = {};
                CATEGORIES.forEach(cat => { data[today][cat] = []; });
            }
            if (!data[today][category]) data[today][category] = [];
            data[today][category].push(pendingContent.trim());
            saveData();
            renderTable();
            contentInput.value = '';
            pendingContent = '';
            hideCategorySelector();
        }

        async function uploadToGitHub() {
            if (!syncConfig) { syncStatus.textContent = '请先配置GitHub'; return; }
            const pw = syncPassword.value;
            if (!pw) { syncStatus.textContent = '请输入同步密码'; return; }
            const plain = JSON.stringify(data);
            const encrypted = encrypt(plain, pw);
            const content = btoa(unescape(encodeURIComponent(JSON.stringify({ data: encrypted }))));
            const apiUrl = `https://api.github.com/repos/${syncConfig.username}/${syncConfig.repo}/contents/${SYNC_FILE}`;

            let sha = null;
            try {
                const resp = await fetch(apiUrl, { headers: { 'Authorization': `token ${syncConfig.token}` } });
                if (resp.ok) { const d = await resp.json(); sha = d.sha; }
            } catch(e) {}

            const body = { message: 'update daily tracker', content };
            if (sha) body.sha = sha;

            const resp = await fetch(apiUrl, {
                method: 'PUT',
                headers: { 'Authorization': `token ${syncConfig.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (resp.ok) {
                syncStatus.textContent = '已上传 ' + new Date().toLocaleTimeString('zh-CN');
            } else {
                const err = await resp.json();
                syncStatus.textContent = '上传失败: ' + (err.message || '未知');
            }
        }

        async function downloadFromGitHub() {
            if (!syncConfig) { syncStatus.textContent = '请先配置GitHub'; return; }
            const pw = syncPassword.value;
            if (!pw) { syncStatus.textContent = '请输入同步密码'; return; }
            const apiUrl = `https://api.github.com/repos/${syncConfig.username}/${syncConfig.repo}/contents/${SYNC_FILE}`;
            const resp = await fetch(apiUrl, { headers: { 'Authorization': `token ${syncConfig.token}` } });
            if (!resp.ok) { syncStatus.textContent = '云端暂无备份'; return; }
            const d = await resp.json();
            try {
                const wrapper = JSON.parse(decodeURIComponent(escape(atob(d.content))));
                const plain = decrypt(wrapper.data, pw);
                if (!plain) { syncStatus.textContent = '密码错误'; return; }
                const parsed = JSON.parse(plain);
                if (parsed) data = parsed;
                saveData();
                renderTable();
                syncStatus.textContent = '已下载 ' + new Date().toLocaleTimeString('zh-CN');
            } catch(e) {
                syncStatus.textContent = '数据格式错误或密码不对';
            }
        }

        addBtn.addEventListener('click', () => {
            const val = contentInput.value.trim();
            if (!val) { alert('请输入内容'); return; }
            pendingContent = val;
            showCategorySelector();
        });

        categoryGrid.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                addContentToCategory(e.currentTarget.getAttribute('data-category'));
            });
        });

        cancelCategoryBtn.addEventListener('click', hideCategorySelector);
        categorySelector.addEventListener('click', (e) => {
            if (e.target === categorySelector) hideCategorySelector();
        });

        contentInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addBtn.click();
        });

        uploadBtn.addEventListener('click', uploadToGitHub);
        downloadBtn.addEventListener('click', downloadFromGitHub);
        saveSetupBtn.addEventListener('click', saveSyncConfig);

        loadSyncConfig();
        loadData();
        renderTable();
    })();
</script>
</body>
</html>
