<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover, apple-mobile-web-app-capable=yes, apple-mobile-web-app-status-bar-style=default">
  <title>末日余生 · 第一章</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      font-family: 'Segoe UI', 'Noto Serif SC', 'SimSun', serif;
      padding: 0.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .game-container {
      max-width: 500px;
      width: 100%;
      background: #f5f0e8;
      border: 3px solid #3a3a3a;
      border-radius: 0.5rem;
      padding: 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      min-height: 80vh;
      position: relative;
    }
    .chapter-title {
      text-align: center;
      font-weight: 700;
      font-size: 1.2rem;
      color: #2a2a2a;
      border-bottom: 2px solid #3a3a3a;
      padding-bottom: 0.5rem;
      letter-spacing: 3px;
    }
    .scene-text {
      font-size: 0.95rem;
      line-height: 1.9;
      color: #1a1a1a;
      flex: 1;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 50vh;
      padding-right: 0.3rem;
    }
    .choices-area {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: auto;
    }
    .choice-btn {
      background: #2a2a2a;
      color: #f0e8d8;
      border: 1px solid #555;
      padding: 0.8rem 1rem;
      border-radius: 0.3rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: 0.1s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 1px;
      font-family: inherit;
    }
    .choice-btn:active {
      background: #1a1a1a;
      color: #fff;
    }
    .death-info {
      text-align: center;
      color: #a03030;
      font-weight: 700;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
    .reset-area {
      text-align: center;
      margin-top: 0.3rem;
    }
    .reset-btn {
      background: transparent;
      border: 1px solid #aaa;
      color: #666;
      padding: 0.3rem 1rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      cursor: pointer;
    }
    /* 结局统计面板 */
    .stats-panel {
      background: #fff;
      border: 2px solid #2a2a2a;
      border-radius: 0.5rem;
      padding: 1.2rem;
      margin-bottom: 0.5rem;
    }
    .stats-panel h3 {
      text-align: center;
      font-size: 1rem;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.4rem;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 0.3rem 0;
      border-bottom: 1px dotted #eee;
    }
    .stat-row .label { color: #666; }
    .stat-row .value { color: #1a1a1a; font-weight: 700; text-align: right; }
    .copy-hint {
      text-align: center;
      color: #888;
      font-size: 0.7rem;
      margin-top: 0.6rem;
      font-style: italic;
    }
    @media (max-width: 400px) {
      .game-container { padding: 1rem 0.8rem; }
      .scene-text { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="chapter-title" id="chapterDisplay">第一章 · 零号病人</div>
  <div class="scene-text" id="sceneText">加载中...</div>
  <div class="stats-panel" id="statsPanel" style="display:none;"></div>
  <div class="choices-area" id="choicesArea"></div>
  <div class="death-info" id="deathInfo"></div>
  <div class="reset-area">
    <button class="reset-btn" id="hardResetBtn">重新开始</button>
  </div>
</div>

<script>
  (function() {
    // ---------- 选择记录器 ----------
    let choiceLog = []; // 记录每次选择：{ sceneId, choiceIndex, choiceText }

    // ---------- 剧情数据 ----------
    const scenes = {
      "start": {
        chapter: "第一章 · 零号病人",
        text: "剧烈的头痛把你从昏睡中拽醒。\n\n你叫苏禾，29岁，市第三人民医院的护士。\n昨晚值班时突然晕倒，现在你躺在自己科室的病床上，手背上还扎着点滴。\n\n走廊传来异样的嚎叫声——那不是人类的嗓子能发出的声音。\n紧接着是玻璃碎裂的巨响，有人在跑，不止一个。\n\n你扯掉针头，光着脚走到病房门口。",
        choices: [
          { text: "开门出去看看", next: "open_door" },
          { text: "先找防身的东西", next: "search_room" }
        ]
      },

      "open_door": {
        text: "你推开病房门。\n\n走廊的日光灯忽明忽暗，地上有几摊暗红色的液体。\n一个穿着病号服的人背对着你，正趴在什么东西上面。\n\n它听到响动，猛地转过头——\n那张脸上没有嘴唇，牙齿全部暴露在外，眼眶里全是白色，没有瞳孔。\n\n它朝你冲过来。\n你手里什么都没有。",
        choices: [
          { text: "退回病房堵住门", next: "barricade" },
          { text: "用输液架反击", next: "fight_pole" }
        ]
      },

      "search_room": {
        text: "你在病房里快速翻找。\n\n抽屉里只有几卷纱布和病历本。床头的呼叫铃还能按，但没有反应。\n你注意到床边的输液架是金属的，可以拆下来当棍子用。\n\n墙角还有一个清洁工留下的拖把。",
        choices: [
          { text: "拿输液架", next: "take_pole" },
          { text: "拿拖把", next: "take_mop" }
        ]
      },

      "take_pole": {
        text: "你拆下输液架，握在手里沉甸甸的。\n\n金属的触感让你稍微安心了一点。\n你推开病房门，走廊里有几个蹒跚的身影正朝这边移动。\n\n远处，一个护士模样的女人在朝你挥手：\n\"这边！安全通道在这边！\"",
        choices: [
          { text: "跑向那个女人", next: "run_to_nurse" },
          { text: "独自走另一侧楼梯", next: "alone_stairs" }
        ]
      },

      "take_mop": {
        text: "你抓起拖把。木头柄，手感很轻，但至少是个武器。\n\n你推开病房门，走廊里的东西数量比你想象的少。\n你注意到护士站的电脑还亮着，屏幕上闪烁着紧急通知。\n\n或许上面有有用的信息。",
        choices: [
          { text: "去护士站查看电脑", next: "check_computer" },
          { text: "直接朝安全出口走", next: "run_exit_direct" }
        ]
      },

      "barricade": {
        text: "你猛地退回病房，用身体抵住门。\n\n那东西在外面疯狂撞门，每一次撞击都让门框上的灰尘簌簌落下。\n门锁已经变形了，你知道撑不过一分钟。\n\n窗户——病房在二楼，外面是草地。",
        choices: [
          { text: "跳窗", next: "jump_window" },
          { text: "继续堵门等救援", next: "keep_barricade" }
        ]
      },

      "fight_pole": {
        text: "你抓起旁边的输液架，朝那东西的头砸去。\n\n但它比你先动手——\n在你举起架子之前，它已经扑到你身上。\n你闻到了腐肉的气味，然后脖子一阵剧痛。\n\n你的视野在几秒内变黑。",
        choices: [],
        death: true,
        returnTo: "open_door"
      },

      "jump_window": {
        text: "你拉开窗户，深吸一口气。\n\n下面是一片绿化带，泥土被雨水泡得松软。\n在那东西撞开门的瞬间，你跳了下去。\n\n着地时脚踝一阵疼痛，但你能跑。\n你爬起来，朝医院后门的方向踉跄跑去。",
        choices: [
          { text: "继续前进", next: "back_gate" }
        ]
      },

      "keep_barricade": {
        text: "你用尽全力抵着门，但人类的力气终究有限。\n\n门被撞开了，那东西压在你身上。\n你最后看到的是天花板上日光灯的闪烁。",
        choices: [],
        death: true,
        returnTo: "barricade"
      },

      "run_to_nurse": {
        text: "你朝那个女人跑去。\n\n她穿着和你一样的护士服，脸上全是血迹和污渍，但眼睛是正常的——她是活人。\n\"苏禾！是你！\"她认出你了，是隔壁科室的林姐。\n\n\"整栋楼都封锁了，外面有军队，但不知道是来救人的还是来...\"\n她没说完，走廊尽头传来整齐的脚步声。",
        choices: [
          { text: "跟林姐躲进储藏室", next: "hide_storage" },
          { text: "朝脚步声方向走，可能是救援", next: "toward_sound" }
        ]
      },

      "alone_stairs": {
        text: "你选择避开人群，独自走另一侧的楼梯。\n\n楼梯间很安静，只有应急灯在闪烁。\n你下了两层，发现一楼的楼梯口被一堆椅子堵死了。\n\n墙上有用血写的字：\"别出去，外面更糟。\"",
        choices: [
          { text: "翻过障碍继续下楼", next: "over_obstacle" },
          { text: "退回楼上找别的路", next: "back_upstairs" }
        ]
      },

      "check_computer": {
        text: "你冲到护士站。屏幕上是医院内部系统的紧急通知：\n\n\"一级生物安全事件。所有人员就地隔离。\n源头：急诊科接收的无名患者，编号 Z-001。\n传播途径：体液。请避免被咬伤或抓伤。\"\n\nZ-001——昨晚急诊收的那个流浪汉。\n你亲手帮他量过体温。",
        choices: [
          { text: "记住信息，继续撤离", next: "run_exit_direct" },
          { text: "尝试用医院内线联系其他人", next: "call_others" }
        ]
      },

      "run_exit_direct": {
        text: "你不再犹豫，朝最近的安全出口跑。\n\n经过走廊转角时，你看到出口标志的绿光——那一刻你几乎想哭出来。\n\n你推开通往楼梯间的门，开始朝一楼跑。",
        choices: [
          { text: "继续", next: "first_floor" }
        ]
      },

      "call_others": {
        text: "你拿起内线电话，拨了急诊科的号码。\n\n电话那头传来咀嚼声。\n然后是东西掉落的声音。\n\n你挂断电话。你知道急诊科已经没有人了。",
        choices: [
          { text: "转身撤离", next: "run_exit_direct" }
        ]
      },

      "toward_sound": {
        text: "你朝脚步声走去。\n\n不是军队。\n是三个穿防护服的人，但他们手里拿的不是枪，而是——\n你看到他们的防护面罩下面，皮肤呈灰绿色。\n\n他们注意到你了。",
        choices: [],
        death: true,
        returnTo: "run_to_nurse"
      },

      "hide_storage": {
        text: "你和林姐挤进狭小的清洁用品储藏室。\n\n门外的脚步声逐渐远去。黑暗中你只能听到彼此的呼吸声。\n\n林姐低声说：\"我在三楼看到有直升机来过，但很快就走了。\n要么他们放弃了医院，要么...\"\n\n她停顿了很久。\n\"要么外面也沦陷了。\"\n\n储藏室里还有几瓶消毒酒精和抹布。\n林姐突然说：\"酒精能掩盖活人的气味，我听广播里说的。\"",
        choices: [
          { text: "在身上涂抹酒精伪装", next: "use_alcohol" },
          { text: "先等外面彻底安静再出去", next: "wait_longer" }
        ]
      },

      "use_alcohol": {
        text: "你们用酒精浸湿毛巾，在身上涂抹。\n刺鼻的气味让你想吐，但确实能盖住活人的体味。\n\n你们小心地离开储藏室，走廊里暂时安静。\n\n从走廊的窗户看出去，医院正门外停着军车，但没有人。\n整个广场上空无一人，只有风吹动垃圾的沙沙声。\n\n林姐拉了拉你的衣角：\"从地下停车场走。\"",
        choices: [
          { text: "跟林姐去地下停车场", next: "parking_lot" },
          { text: "你决定先去药房拿医疗物资", next: "pharmacy" }
        ]
      },

      "wait_longer": {
        text: "你们在储藏室里等了将近一个小时。\n\n外面渐渐安静了，只有偶尔远处传来的尖叫。\n但储藏室的空气越来越闷，消毒水的味道让你们头晕。\n\n林姐小声说：\"再等下去我们会缺氧的。\"",
        choices: [
          { text: "冒险出去", next: "use_alcohol" }
        ]
      },

      "parking_lot": {
        text: "你们从楼梯下到地下停车场。\n\n这里光线昏暗，只有几盏应急灯。\n地上有几具尸体，但你们不敢细看。\n\n你听到汽车引擎的声音——不是一辆，是车队。\n从停车场出口的方向传来。\n\n林姐抓住你的手：\"可能是救援。\"\n但她没动，因为她也知道——\n也可能是别的什么。\n\n停车场出口有两条路：一条是车辆通道，通往地面广场；一条是消防通道，通向医院后方的街区。",
        choices: [
          { text: "走车辆通道去广场", next: "to_square" },
          { text: "走消防通道去街区", next: "to_streets" }
        ]
      },

      "pharmacy": {
        text: "你让林姐先去停车场，自己跑去药房拿物资。\n\n药房的门已经被撬开，里面一片狼藉。\n你捡了几卷绷带、止痛药和抗生素。\n\n就在你要离开时，听到柜台后面有动静——一个穿着白大褂的医生蜷缩在角落里，手里握着手术刀。\n他眼神惊恐地看着你：\"别过来！我是人！我没被感染！\"",
        choices: [
          { text: "让他跟你一起走", next: "take_doctor" },
          { text: "拿了药自己离开", next: "leave_doctor" }
        ]
      },

      "take_doctor": {
        text: "你安抚他，确认他身上没有伤口。\n他姓周，是内科的住院医师，爆发后就躲在这里没出去过。\n\n\"我知道一条路，\"周医生说，\"医院地下有运送尸体的通道，直通后街。\n但那里...我不知道下面现在是什么情况。\"\n\n你带着周医生朝地下通道走去。",
        choices: [
          { text: "走地下尸体通道", next: "morgue_tunnel" }
        ]
      },

      "leave_doctor": {
        text: "你拿了药就走。周医生在你身后喊了什么，但你没回头。\n\n你跑向地下停车场，在入口处遇到了焦急的林姐。\n\"怎么这么久？\"她问。\n\n\"遇到一个人，但我没带他。\"你说。\n林姐沉默了一下，没有追问。",
        choices: [
          { text: "一起找出口", next: "parking_lot" }
        ]
      },

      "morgue_tunnel": {
        text: "周医生带路，你们沿着维护通道来到地下二层。\n\n这里温度骤降，停尸间的冷气还在运作。\n不锈钢的解剖台上空无一人，但角落的尸袋有几个在地上——\n是空的，拉链是裂开的。\n\n通道门就在五十米外。但你需要穿过停尸间。",
        choices: [
          { text: "快速穿过", next: "cross_morgue_fast" },
          { text: "小心摸过去", next: "cross_morgue_slow" }
        ]
      },

      "cross_morgue_fast": {
        text: "你们跑起来。\n\n跑到一半时，一个空尸袋绊倒了周医生。\n他摔倒的声音在空旷的停尸间里回荡。\n\n然后你听到——\n不锈钢柜子里传来撞击声。\n不是一个，是好几个。\n\n你拉起周医生，发疯似的冲向通道门。\n\n门关上的瞬间，你听到身后有什么东西冲出了柜子。\n\n你们靠在门这边大口喘气。\n面前是通往后街的坡道，月光照在地面上——\n那是今晚你第一次看到月光。",
        choices: [
          { text: "走出通道", next: "outside_hospital" }
        ]
      },

      "cross_morgue_slow": {
        text: "你们蹑手蹑脚地走。\n\n快走到一半时，周医生突然拉住你——\n他指了指墙角。\n\n那里蹲着一个小孩。\n穿着病号服，背对着你们，身体轻微摇晃。\n\n它没有察觉到你们。",
        choices: [
          { text: "绕过去，不惊动它", next: "sneak_past_child" },
          { text: "从另一侧柜子后面绕", next: "alternate_route" }
        ]
      },

      "sneak_past_child": {
        text: "你们屏住呼吸，贴着另一面墙绕过去。\n\n那孩子没有转头。\n你们成功通过了停尸间，推开通往后街的通道门。\n\n夜风吹在脸上，带着焦糊的味道。\n远处的城市一片漆黑，只有几处火光在燃烧。\n\n周医生跪在地上干呕。\n你看着眼前的街道——\n这是你生活了十年的城市，现在像一座刚经历战火的废墟。",
        choices: [
          { text: "继续", next: "outside_hospital" }
        ]
      },

      "alternate_route": {
        text: "你们绕道柜子后面。\n\n但这里太暗，你没看到地面有一截断掉的水管。\n你踩上去，金属刮擦发出尖锐的声音。\n\n那孩子转过了头。\n\n然后所有柜子都开始撞击。\n\n你们拼命跑向通道门。\n周医生先出去了，但你跑到门前时——\n一只冰冷的手抓住了你的脚踝。\n\n你被拖倒了。\n\n门在周医生的哭喊中关上。",
        choices: [],
        death: true,
        returnTo: "cross_morgue_slow"
      },

      "outside_hospital": {
        text: "",
        choices: [],
        isEnding: true
      },

      "end_chapter1": {
        text: "感谢游玩第一章。\n\n你已成功逃离医院。\n\n在即将到来的第二章中：\n· 你将在废墟中寻找其他幸存者\n· 城市的真实状况将逐渐明朗\n· 零号病人的秘密将被揭开一角\n\n—— 敬请期待 ——",
        choices: [
          { text: "重新开始", next: "start" }
        ]
      },

      "over_obstacle": {
        text: "你费力翻过那些椅子，下到一楼。\n\n一楼大厅的景象让你震惊——\n地上横七竖八躺着人，有些还在动，有些不在了。\n出口的玻璃门碎了一地，外面停着几辆军车，但没看到士兵。\n\n你可以从这里出去。",
        choices: [
          { text: "从大厅出口出去", next: "show_ending" }
        ]
      },

      "back_upstairs": {
        text: "你退回楼上。\n\n刚走到楼梯转角，上面冲下来一个人——\n是林姐，她看到你，眼泪刷地下来。\n\"我还以为你...\"\n\n她帮你翻过障碍，你们一起下到一楼。",
        choices: [
          { text: "一起从大厅出去", next: "show_ending" }
        ]
      },

      "first_floor": {
        text: "你来到一楼。大厅一片混乱，但有光——\n出口碎裂的玻璃门外面，月光照亮了广场。\n\n你跑出去，终于呼吸到了外面的空气。\n虽然这空气里全是烟尘。",
        choices: [
          { text: "离开医院", next: "show_ending" }
        ]
      },

      "to_square": {
        text: "你们从车辆通道走上广场。\n\n军车还在，但驾驶室是空的。\n地上有弹壳，但没有尸体。\n\n远处传来直升机的轰鸣，探照灯扫过广场——\n然后它飞走了，没有停。\n\n你们望着直升机消失的方向，明白自己暂时不会被救走了。",
        choices: [
          { text: "朝街区方向走", next: "show_ending" }
        ]
      },

      "to_streets": {
        text: "你们从消防通道出来，直接进入了后街。\n\n这条街你走过无数次——去上班、下班、买菜。\n但现在它看起来像另一个世界。\n\n林姐说：\"我们先找个地方躲起来，天亮再决定往哪走。\"",
        choices: [
          { text: "继续", next: "show_ending" }
        ]
      },

      "back_gate": {
        text: "你穿过绿化带，从医院后门出来。\n\n脚踝还在疼，但能走。\n后街很安静，只有风声。\n\n你活着出来了。",
        choices: [
          { text: "继续", next: "show_ending" }
        ]
      },

      "show_ending": {
        text: "",
        choices: [],
        isEnding: true
      }
    };

    // ---------- 结局统计生成 ----------
    function generateStats() {
      const stats = {
        weapon: '无',
        companion: '独自一人',
        injury: '无',
        supplies: '无',
        knowledge: '未知',
        exitRoute: '未知',
        livingAllies: [],
        deadAllies: []
      };

      // 分析选择记录
      choiceLog.forEach(entry => {
        // 武器
        if (entry.choiceText.includes('输液架')) stats.weapon = '输液架（金属棍）';
        if (entry.choiceText.includes('拖把')) stats.weapon = '拖把（木棍）';
        
        // 同伴
        if (entry.choiceText.includes('林姐') || entry.sceneId === 'run_to_nurse') {
          stats.companion = '林姐（护士）';
          if (!stats.livingAllies.includes('林姐')) stats.livingAllies.push('林姐');
        }
        if (entry.choiceText.includes('让他跟你一起走') || entry.sceneId === 'take_doctor') {
          stats.companion = '林姐 + 周医生';
          if (!stats.livingAllies.includes('周医生')) stats.livingAllies.push('周医生');
        }
        if (entry.choiceText.includes('拿了药自己离开')) {
          stats.livingAllies = stats.livingAllies.filter(a => a !== '周医生');
          if (!stats.deadAllies.includes('周医生（被遗弃）')) stats.deadAllies.push('周医生（被遗弃）');
        }
        
        // 受伤
        if (entry.choiceText.includes('跳窗') || entry.sceneId === 'jump_window') stats.injury = '脚踝扭伤';
        
        // 物资
        if (entry.sceneId === 'pharmacy' || entry.sceneId === 'take_doctor' || entry.sceneId === 'leave_doctor') {
          stats.supplies = '绷带、止痛药、抗生素';
        }
        if (entry.choiceText.includes('酒精') || entry.sceneId === 'use_alcohol') {
          stats.supplies += '、消毒酒精';
        }
        
        // 知识
        if (entry.sceneId === 'check_computer') stats.knowledge = '知道零号病人Z-001，传播途径为体液';
        
        // 出口
        if (entry.choiceText.includes('消防通道') || entry.sceneId === 'to_streets') stats.exitRoute = '消防通道 → 后街';
        if (entry.choiceText.includes('车辆通道') || entry.sceneId === 'to_square') stats.exitRoute = '车辆通道 → 广场';
        if (entry.sceneId === 'back_gate') stats.exitRoute = '跳窗 → 后门';
        if (entry.sceneId === 'cross_morgue_fast' || entry.sceneId === 'sneak_past_child') stats.exitRoute = '地下尸体通道 → 后街';
        if (entry.sceneId === 'over_obstacle' || entry.sceneId === 'back_upstairs') stats.exitRoute = '楼梯 → 大厅出口';
        if (entry.sceneId === 'first_floor') stats.exitRoute = '安全通道 → 大厅出口';
        if (entry.sceneId === 'alone_stairs') stats.companion = '独自一人';
      });

      // 同伴总结
      if (stats.livingAllies.length === 0 && !choiceLog.some(e => e.sceneId === 'run_to_nurse')) {
        stats.companion = '独自一人';
      }
      if (stats.livingAllies.length === 1 && stats.livingAllies[0] === '林姐') {
        stats.companion = '林姐（护士）';
      }
      if (stats.livingAllies.length === 1 && stats.livingAllies[0] === '周医生') {
        stats.companion = '周医生（内科医师）';
      }
      if (stats.livingAllies.includes('林姐') && stats.livingAllies.includes('周医生')) {
        stats.companion = '林姐（护士）+ 周医生（内科医师）';
      }

      return stats;
    }

    function renderStats(stats) {
      return `
        <div class="stats-panel">
          <h3>📋 第一章结局统计</h3>
          <div class="stat-row"><span class="label">武器</span><span class="value">${stats.weapon}</span></div>
          <div class="stat-row"><span class="label">同伴</span><span class="value">${stats.companion}</span></div>
          <div class="stat-row"><span class="label">受伤状态</span><span class="value">${stats.injury}</span></div>
          <div class="stat-row"><span class="label">携带物资</span><span class="value">${stats.supplies}</span></div>
          <div class="stat-row"><span class="label">关键情报</span><span class="value">${stats.knowledge}</span></div>
          <div class="stat-row"><span class="label">逃离路线</span><span class="value">${stats.exitRoute}</span></div>
          ${stats.deadAllies.length > 0 ? `<div class="stat-row"><span class="label">已损失</span><span class="value" style="color:#a03030;">${stats.deadAllies.join('、')}</span></div>` : ''}
          <div class="copy-hint">请截图或复制以上统计信息发给作者，用于衔接第二章剧情</div>
        </div>
      `;
    }

    // 当前场景
    let currentScene = "start";
    let lastChoiceScene = "start";

    // DOM
    const chapterDisplay = document.getElementById('chapterDisplay');
    const sceneText = document.getElementById('sceneText');
    const choicesArea = document.getElementById('choicesArea');
    const deathInfo = document.getElementById('deathInfo');
    const hardResetBtn = document.getElementById('hardResetBtn');
    const statsPanel = document.getElementById('statsPanel');

    function renderScene(sceneId) {
      const scene = scenes[sceneId];
      if (!scene) {
        sceneText.textContent = "【错误：场景不存在，请重新开始】";
        choicesArea.innerHTML = '';
        return;
      }

      // 如果是结局节点，先显示统计
      if (scene.isEnding) {
        const stats = generateStats();
        statsPanel.innerHTML = renderStats(stats);
        statsPanel.style.display = 'block';
        
        // 显示结局文本
        chapterDisplay.textContent = "第一章 · 结局";
        sceneText.textContent = "你站在医院外的街道上。\n\n月光很亮，照在破碎的广告牌和废弃的汽车上。\n远处偶尔有零星的枪声。\n\n你从医院逃出来了。\n但活下来只是开始。\n\n—— 第一章 完 ——";
        deathInfo.textContent = '';
        
        // 渲染后续选项
        choicesArea.innerHTML = '';
        
        // 继续第二章按钮
        const continueBtn = document.createElement('button');
        continueBtn.className = 'choice-btn';
        continueBtn.textContent = '▶ 等待第二章...';
        continueBtn.style.textAlign = 'center';
        continueBtn.addEventListener('click', () => {
          renderScene('end_chapter1');
        });
        choicesArea.appendChild(continueBtn);
        
        // 重新开始按钮
        const restartBtn = document.createElement('button');
        restartBtn.className = 'choice-btn';
        restartBtn.textContent = '↺ 重新开始';
        restartBtn.style.textAlign = 'center';
        restartBtn.addEventListener('click', () => {
          statsPanel.style.display = 'none';
          choiceLog = [];
          currentScene = 'start';
          lastChoiceScene = 'start';
          renderScene('start');
        });
        choicesArea.appendChild(restartBtn);
        
        sceneText.scrollTop = 0;
        return;
      }

      // 普通场景
      statsPanel.style.display = 'none';
      chapterDisplay.textContent = scene.chapter || "第一章";
      sceneText.textContent = scene.text;
      deathInfo.textContent = '';

      if (scene.choices && scene.choices.length > 0) {
        lastChoiceScene = sceneId;
      }

      // 渲染选项
      choicesArea.innerHTML = '';
      if (scene.death) {
        deathInfo.textContent = '你死了';
        const returnBtn = document.createElement('button');
        returnBtn.className = 'choice-btn';
        returnBtn.textContent = '▶ 返回上一个选择点';
        returnBtn.addEventListener('click', () => {
          renderScene(scene.returnTo || lastChoiceScene);
        });
        choicesArea.appendChild(returnBtn);
      } else if (scene.choices && scene.choices.length > 0) {
        scene.choices.forEach((choice, index) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.textContent = `${index + 1}. ${choice.text}`;
          btn.addEventListener('click', () => {
            choiceLog.push({
              sceneId: sceneId,
              choiceIndex: index,
              choiceText: choice.text
            });
            renderScene(choice.next);
          });
          choicesArea.appendChild(btn);
        });
      } else {
        const noChoice = document.createElement('div');
        noChoice.style.cssText = 'color:#666;font-size:0.8rem;text-align:center;';
        noChoice.textContent = '—— 无可选选项 ——';
        choicesArea.appendChild(noChoice);
      }

      sceneText.scrollTop = 0;
    }

    hardResetBtn.addEventListener('click', () => {
      if (confirm('确定重新开始吗？当前进度将丢失。')) {
        statsPanel.style.display = 'none';
        choiceLog = [];
        currentScene = 'start';
        lastChoiceScene = 'start';
        renderScene('start');
      }
    });

    renderScene('start');
  })();
</script>
</body>
</html>
