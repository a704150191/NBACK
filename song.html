      },

      {

      {

        lyrics: [

          "One of us is lying",
          "In her lonely bed"

      },
      {
        title: "Ring Ring", artist: "ABBA",
        lyrics: [

          "I was waiting all alone",
          "Baby by myself I sit and wait and wonder about you",

          "Seems like nothing's going right",

          "Yes I'm down and feeling blue",
          "And I don't know what to do",
          "Ring ring, why don't you give me a call?"
        ]
      },
      {
        title: "I'm Still Alive", artist: "ABBA",
        lyrics: [

          "I couldn't win, I was out of luck",

          "I've been down and out and I've been kicked around",
          "But I'm still alive, I'm still alive",
          "I'm not the man I used to be",
          "But I'm still alive, I'm still alive",
          "And I'm here to tell you that I'm still alive"
        ]
      }
    ];

    // 全局状态
    let apiKey = '';
    let currentIndex = 0;
    let currentSong = null;
    let skipFlags = {};
    let userTranslations = {};

    const CURRENT_INDEX_KEY = 'lyric_current_index_v2';
    const TRANSLATION_PREFIX = 'lyric_trans_v2_';
    const SKIP_PREFIX = 'lyric_skip_v2_';

    const songTitleEl = document.getElementById('songTitle');
    const songArtistEl = document.getElementById('songArtist');
    const linesContainer = document.getElementById('linesContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const exportBtn = document.getElementById('exportBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const analysisBox = document.getElementById('analysisBox');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const progressEl = document.getElementById('progress');

    function getStorageKey(song, prefix) {
      return prefix + song.title.replace(/[^a-zA-Z0-9]/g, '_');
    }

    function loadSongState(song) {
      const tKey = getStorageKey(song, TRANSLATION_PREFIX);
      const sKey = getStorageKey(song, SKIP_PREFIX);
      userTranslations = JSON.parse(localStorage.getItem(tKey) || '{}');
      skipFlags = JSON.parse(localStorage.getItem(sKey) || '{}');
    }

    function saveSongState(song) {
      localStorage.setItem(getStorageKey(song, TRANSLATION_PREFIX), JSON.stringify(userTranslations));
      localStorage.setItem(getStorageKey(song, SKIP_PREFIX), JSON.stringify(skipFlags));
    }

    function renderSong(index) {
      currentSong = SONGS[index];
      if (!currentSong) return;
      songTitleEl.textContent = currentSong.title;
      songArtistEl.textContent = currentSong.artist;
      loadSongState(currentSong);

      const lines = currentSong.lyrics || [];
      linesContainer.innerHTML = lines.map((line, idx) => {
        const skipped = skipFlags[idx] || false;
        const translation = userTranslations[idx] || '';
        return `
          <div class="line-item">
            <div class="original-text">${escHtml(line)}</div>
            <button class="skip-btn ${skipped ? 'skipped' : ''}" data-index="${idx}">跳过</button>
            <textarea class="translation-input" data-index="${idx}" placeholder="输入翻译..." ${skipped ? 'disabled' : ''}>${escHtml(translation)}</textarea>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.skip-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const idx = parseInt(btn.dataset.index);
          skipFlags[idx] = !skipFlags[idx];
          saveSongState(currentSong);
          renderSong(index);
        });
      });
      document.querySelectorAll('.translation-input').forEach(textarea => {
        textarea.addEventListener('input', (e) => {
          const idx = parseInt(textarea.dataset.index);
          userTranslations[idx] = textarea.value;
          saveSongState(currentSong);
        });
      });

      progressEl.textContent = `${index+1}/${SONGS.length}`;
      analysisBox.style.display = 'none';
      localStorage.setItem(CURRENT_INDEX_KEY, index);
    }

    function changeSong(delta) {
      let newIndex = currentIndex + delta;
      if (newIndex < 0) newIndex = 0;
      if (newIndex >= SONGS.length) newIndex = SONGS.length - 1;
      if (newIndex !== currentIndex) {
        saveSongState(currentSong);
        currentIndex = newIndex;
        renderSong(currentIndex);
      }
    }

    async function analyzeCurrentSong() {
      if (!apiKey) { alert('请先保存API Key'); return; }
      if (!currentSong) return;
      const lines = currentSong.lyrics || [];
      const nonSkipped = lines.map((line, idx) => ({ line, idx, trans: userTranslations[idx] || '', skipped: skipFlags[idx] }))
                           .filter(item => !item.skipped && item.trans.trim() !== '');
      if (nonSkipped.length === 0) {
        analysisBox.style.display = 'block';
        analysisBox.textContent = '没有可分析的行（请填写翻译）。';
        return;
      }
      analysisBox.style.display = 'block';
      analysisBox.textContent = '分析中...';
      const linesData = nonSkipped.map(item => `原文：${item.line}\n翻译：${item.trans}`).join('\n\n');
      const prompt = `请逐行分析以下英文歌词翻译的质量，指出每行的优点和不足。然后给出整体评价，说明总体好在哪、不好在哪。\n\n${linesData}`;
      try {
        const resp = await fetch('https://api.deepseek.com/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
          body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], temperature: 0.6, max_tokens: 1000 })
        });
        if (!resp.ok) throw new Error('分析请求失败');
        const json = await resp.json();
        analysisBox.textContent = json.choices[0].message.content;
      } catch (err) {
        analysisBox.textContent = '分析失败: ' + err.message;
      }
    }

    function exportTranslation() {
      if (!currentSong) return;
      const lines = currentSong.lyrics || [];
      let exportText = `${currentSong.title} - ${currentSong.artist}\n\n`;
      lines.forEach((line, idx) => {
        if (skipFlags[idx]) return;
        const trans = userTranslations[idx] || '';
        exportText += `原文：${line}\n翻译：${trans}\n\n`;
      });
      const blob = new Blob([exportText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${currentSong.title}_翻译.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function init() {
      const savedIndex = parseInt(localStorage.getItem(CURRENT_INDEX_KEY));
      currentIndex = (savedIndex >= 0 && savedIndex < SONGS.length) ? savedIndex : 0;
      renderSong(currentIndex);
      apiKey = localStorage.getItem('deepseek_api_key') || '';
      if (apiKey) apiKeyInput.value = apiKey;
    }

    prevBtn.addEventListener('click', () => changeSong(-1));
    nextBtn.addEventListener('click', () => changeSong(1));
    exportBtn.addEventListener('click', exportTranslation);
    analyzeBtn.addEventListener('click', analyzeCurrentSong);
    saveApiKeyBtn.addEventListener('click', () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        localStorage.setItem('deepseek_api_key', key);
        apiKey = key;
        alert('API Key 已保存');
      }
    });

    init();
  })();
</script>
