<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5, viewport-fit=cover, apple-mobile-web-app-capable=yes, apple-mobile-web-app-status-bar-style=default">
  <title>私人笔记本</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, sans-serif;
      padding: 0.6rem;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .app-container {
      max-width: 550px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 2rem;
      padding: 1.4rem 1.2rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-top: 0.5rem;
    }
    h1 {
      font-weight: 600;
      font-size: 1.5rem;
      color: #1a1a1a;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notebook-selector {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .notebook-tag {
      background: #ffffff;
      border: 1px solid #ccc;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .notebook-tag.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    .notebook-add {
      background: transparent;
      border: 1px dashed #aaa;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #777;
      cursor: pointer;
    }
    .search-bar {
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      outline: none;
      color: #1a1a1a;
      background: #fafafa;
    }
    .search-bar:focus {
      border-color: #1a1a1a;
      background: #fff;
    }
    .sync-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: #999;
    }
    .sync-row .btn {
      font-size: 0.7rem;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      background: white;
      border: 1px solid #ccc;
      color: #555;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .sync-row .btn:active {
      background: #f0f0f0;
    }
    .note-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 400px;
      overflow-y: auto;
    }
    .note-item {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      -webkit-tap-highlight-color: transparent;
    }
    .note-item:active {
      background: #f5f5f5;
    }
    .note-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #999;
    }
    .note-title-preview {
      font-weight: 700;
      font-size: 0.95rem;
      color: #1a1a1a;
    }
    .note-body-preview {
      font-size: 0.8rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edit-panel {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .edit-panel input, .edit-panel textarea {
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 1rem;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      outline: none;
      color: #1a1a1a;
      background: #fafafa;
      font-family: inherit;
      resize: vertical;
    }
    .edit-panel input:focus, .edit-panel textarea:focus {
      border-color: #1a1a1a;
      background: #fff;
    }
    .button-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .btn {
      background: white;
      border: 2px solid #1a1a1a;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.6px;
      color: #1a1a1a;
      cursor: pointer;
      transition: 0.1s;
      background: #ffffff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      flex: 1 1 auto;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:active {
      background: #f0f0f0;
      transform: scale(0.97);
    }
    .btn.primary {
      background: #1a1a1a;
      color: white;
    }
    .btn.danger {
      border-color: #b33a3a;
      color: #b33a3a;
    }
    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 2rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    私人笔记本
    <button class="btn" id="newNoteBtn" style="flex:0 0 auto; font-size:0.8rem; padding:0.4rem 1rem;">+ 新建</button>
  </h1>

  <div class="notebook-selector" id="notebookSelector"></div>

  <input type="text" class="search-bar" id="searchInput" placeholder="搜索笔记...">

  <div class="sync-row">
    <span id="syncStatus">未同步</span>
    <button class="btn" id="uploadBtn">上传备份</button>
    <button class="btn" id="downloadBtn">下载恢复</button>
  </div>

  <div class="note-list" id="noteList">
    <div class="empty-state">暂无笔记，点击「新建」开始记录</div>
  </div>

  <div class="edit-panel" id="editPanel" style="display:none;">
    <input type="text" id="noteTitleInput" placeholder="标题">
    <textarea id="noteBodyInput" rows="6" placeholder="内容..."></textarea>
    <div class="button-row">
      <button class="btn primary" id="saveNoteBtn">保存</button>
      <button class="btn" id="cancelEditBtn">取消</button>
      <button class="btn danger" id="deleteNoteBtn" style="display:none;">删除</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ========== 配置：把下面两处改成你自己的 ==========
    const GITHUB_TOKEN = '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';        // 替换为你的 Token
    const GITHUB_USERNAME = 'a704150191';  // 替换为你的 GitHub 用户名
    const REPO_NAME = 'NBACK';                       // 仓库名，不改也行
    const FILE_PATH = 'notebook_backup.json';        // 备份文件名
    // =============================================

    const STORAGE_KEY = 'private_notebook_app_data';
    let appData = {
      notebooks: {},
      activeNotebook: '默认'
    };
    let editingNoteId = null;

    const notebookSelector = document.getElementById('notebookSelector');
    const noteList = document.getElementById('noteList');
    const searchInput = document.getElementById('searchInput');
    const editPanel = document.getElementById('editPanel');
    const noteTitleInput = document.getElementById('noteTitleInput');
    const noteBodyInput = document.getElementById('noteBodyInput');
    const saveNoteBtn = document.getElementById('saveNoteBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const deleteNoteBtn = document.getElementById('deleteNoteBtn');
    const newNoteBtn = document.getElementById('newNoteBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const syncStatus = document.getElementById('syncStatus');

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { appData = JSON.parse(stored); } catch(e) {}
      }
      if (!appData.notebooks || Object.keys(appData.notebooks).length === 0) {
        appData.notebooks = { '默认': [] };
        appData.activeNotebook = '默认';
      }
      if (!appData.activeNotebook || !appData.notebooks[appData.activeNotebook]) {
        appData.activeNotebook = Object.keys(appData.notebooks)[0];
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function renderAll() {
      renderNotebookSelector();
      renderNoteList();
    }

    function renderNotebookSelector() {
      notebookSelector.innerHTML = '';
      Object.keys(appData.notebooks).forEach(name => {
        const tag = document.createElement('span');
        tag.className = 'notebook-tag' + (name === appData.activeNotebook ? ' active' : '');
        tag.textContent = name;
        tag.addEventListener('click', () => {
          appData.activeNotebook = name;
          saveData();
          renderAll();
        });
        notebookSelector.appendChild(tag);
      });
      const addBtn = document.createElement('span');
      addBtn.className = 'notebook-add';
      addBtn.textContent = '+ 新本';
      addBtn.addEventListener('click', () => {
        const name = prompt('输入新笔记本名称：');
        if (name && name.trim()) {
          const trimmed = name.trim();
          if (!appData.notebooks[trimmed]) {
            appData.notebooks[trimmed] = [];
            appData.activeNotebook = trimmed;
            saveData();
            renderAll();
          } else {
            alert('该笔记本已存在');
          }
        }
      });
      notebookSelector.appendChild(addBtn);
    }

    function renderNoteList() {
      const query = searchInput.value.trim().toLowerCase();
      const notes = appData.notebooks[appData.activeNotebook] || [];
      const filtered = notes.filter(n => {
        if (!query) return true;
        return (n.title || '').toLowerCase().includes(query) || (n.body || '').toLowerCase().includes(query);
      }).sort((a, b) => (b.updatedAt || b.createdAt) - (a.updatedAt || a.createdAt));

      noteList.innerHTML = '';
      if (filtered.length === 0) {
        noteList.innerHTML = '<div class="empty-state">' + (query ? '没有匹配的笔记' : '暂无笔记，点击「新建」开始记录') + '</div>';
        return;
      }
      filtered.forEach(note => {
        const item = document.createElement('div');
        item.className = 'note-item';
        item.innerHTML = `
          <div class="note-meta"><span>${formatDate(note.updatedAt || note.createdAt)}</span></div>
          <div class="note-title-preview">${escapeHtml(note.title || '无标题')}</div>
          <div class="note-body-preview">${escapeHtml(note.body || '空内容')}</div>
        `;
        item.addEventListener('click', () => openEditor(note.id));
        noteList.appendChild(item);
      });
    }

    function openEditor(noteId) {
      const notes = appData.notebooks[appData.activeNotebook] || [];
      const note = notes.find(n => n.id === noteId);
      if (!note) return;
      editingNoteId = noteId;
      noteTitleInput.value = note.title || '';
      noteBodyInput.value = note.body || '';
      deleteNoteBtn.style.display = 'flex';
      editPanel.style.display = 'flex';
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function closeEditor() {
      editingNoteId = null;
      noteTitleInput.value = '';
      noteBodyInput.value = '';
      deleteNoteBtn.style.display = 'none';
      editPanel.style.display = 'none';
    }

    function saveCurrentNote() {
      const title = noteTitleInput.value.trim();
      const body = noteBodyInput.value.trim();
      if (!title && !body) return;
      const notes = appData.notebooks[appData.activeNotebook] || [];
      if (editingNoteId) {
        const idx = notes.findIndex(n => n.id === editingNoteId);
        if (idx >= 0) {
          notes[idx].title = title;
          notes[idx].body = body;
          notes[idx].updatedAt = Date.now();
        }
      } else {
        notes.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          title, body,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
      }
      appData.notebooks[appData.activeNotebook] = notes;
      saveData();
      closeEditor();
      renderAll();
    }

    function deleteCurrentNote() {
      if (!editingNoteId) return;
      if (!confirm('确定删除这条笔记？')) return;
      const notes = appData.notebooks[appData.activeNotebook] || [];
      appData.notebooks[appData.activeNotebook] = notes.filter(n => n.id !== editingNoteId);
      saveData();
      closeEditor();
      renderAll();
    }

    // ========== GitHub 同步逻辑 ==========
    async function uploadToGitHub() {
      const content = JSON.stringify(appData, null, 2);
      const base64 = btoa(unescape(encodeURIComponent(content)));
      const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;

      // 先获取已有文件的 sha（如果存在）
      let sha = null;
      try {
        const getResp = await fetch(apiUrl, {
          headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });
        if (getResp.ok) {
          const data = await getResp.json();
          sha = data.sha;
        }
      } catch(e) {}

      const body = { message: 'update notebook backup', content: base64 };
      if (sha) body.sha = sha;

      const resp = await fetch(apiUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (resp.ok) {
        const now = new Date().toLocaleString('zh-CN');
        syncStatus.textContent = `上次同步: ${now}`;
        localStorage.setItem('last_sync_time', now);
      } else {
        const err = await resp.json();
        syncStatus.textContent = '上传失败: ' + (err.message || '未知错误');
      }
    }

    async function downloadFromGitHub() {
      const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;
      const resp = await fetch(apiUrl, {
        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
      });

      if (!resp.ok) {
        syncStatus.textContent = '下载失败，云端可能还没有备份';
        return;
      }

      const data = await resp.json();
      const decoded = decodeURIComponent(escape(atob(data.content)));
      try {
        const parsed = JSON.parse(decoded);
        if (parsed.notebooks) {
          appData = parsed;
          saveData();
          renderAll();
          const now = new Date().toLocaleString('zh-CN');
          syncStatus.textContent = `已从云端恢复: ${now}`;
          localStorage.setItem('last_sync_time', now);
        }
      } catch(e) {
        syncStatus.textContent = '备份文件格式错误';
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatDate(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    // Events
    saveNoteBtn.addEventListener('click', saveCurrentNote);
    cancelEditBtn.addEventListener('click', closeEditor);
    deleteNoteBtn.addEventListener('click', deleteCurrentNote);
    newNoteBtn.addEventListener('click', () => {
      editingNoteId = null;
      noteTitleInput.value = '';
      noteBodyInput.value = '';
      deleteNoteBtn.style.display = 'none';
      editPanel.style.display = 'flex';
      noteTitleInput.focus();
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
    searchInput.addEventListener('input', renderNoteList);
    uploadBtn.addEventListener('click', uploadToGitHub);
    downloadBtn.addEventListener('click', downloadFromGitHub);

    // Init
    loadData();
    renderAll();
    const lastSync = localStorage.getItem('last_sync_time');
    if (lastSync) {
      syncStatus.textContent = `上次同步: ${lastSync}`;
    }
  })();
</script>
</body>
</html>
